name: queue-checker

replicaCount: 1

ingress:
  enabled: false

service:
  type: ClusterIP
  ports:
    - name: app
      port: 80
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090

serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 15s
  portName: metrics

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::371670420772:role/queue-checker-role

env:
  - name: QUEUE_URL
    value: "https://sqs.eu-west-1.amazonaws.com/371670420772/emails-queue"
  - name: BUCKET_NAME
    value: emails-from-queue

livenessProbe:
  enabled: false
readinessProbe:
  enabled: false
