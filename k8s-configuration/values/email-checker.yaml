name: email-checker

replicaCount: 1

ingress:
  enabled: true
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::371670420772:role/email-checker-role

env:
  - name: QUEUE_URL
    value: "https://sqs.eu-west-1.amazonaws.com/371670420772/emails-queue"
